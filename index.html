function header(){const cc=st.cart.reduce((s,i)=>s+i.q,0);return `<header class="sticky top-0 z-40 bg-white border-b shadow-sm"><div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16"><a href="#/" class="text-2xl font-bold">STYLE<span class="text-orange-500">.UA</span></a><nav class="hidden md:flex gap-6 text-sm font-medium"><a href="#/" class="hover:text-orange-500">Головна</a><a href="#/c" class="hover:text-orange-500">Каталог</a><a href="#/c?g=w" class="hover:text-orange-500">Жіноче</a><a href="#/c?g=m" class="hover:text-orange-500">Чоловіче</a><a href="#/c?cat=a" class="hover:text-orange-500">Аксесуари</a></nav><div class="flex items-center gap-3"><a href="#/acc" class="p-2 hover:bg-gray-100 rounded-full" title="${st.user?st.user.n:'Увійти'}">👤</a><a href="#/fav" class="p-2 hover:bg-gray-100 rounded-full relative">♥${st.fav.length>0?'<span class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">'+st.fav.length+'</span>':''}</a><a href="#/cart" class="p-2 hover:bg-gray-100 rounded-full relative">🛒${cc>0?'<span class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">'+cc+'</span>':''}</a></div></div></header>`}
function footer(){return `<footer class="bg-gray-900 text-gray-300 mt-20"><div class="max-w-7xl mx-auto px-4 py-12 grid md:grid-cols-4 gap-8"><div><h3 class="text-white text-xl font-bold mb-4">STYLE.UA</h3><p class="text-sm">Магазин стильного одягу. Доставка по Україні.</p></div><div><h4 class="text-white font-semibold mb-3">Магазин</h4><ul class="space-y-2 text-sm"><li><a href="#/c" class="hover:text-white">Каталог</a></li><li><a href="#/c" class="hover:text-white">Новинки</a></li></ul></div><div><h4 class="text-white font-semibold mb-3">Контакти</h4><p class="text-sm">📞 +380 (50) 123-45-67</p><p class="text-sm">📧 info@style.ua</p></div><div><h4 class="text-white font-semibold mb-3">Адреса</h4><p class="text-sm">📍 Київ, Хрещатик, 22</p></div></div><div class="border-t border-gray-800 py-4 text-center text-sm text-gray-500">© 2026 STYLE.UA</div></footer>`}
function pcard(p){const isF=st.fav.includes(p.i);return `<div class="bg-white rounded-xl border overflow-hidden cursor-pointer hover:-translate-y-1 hover:shadow-lg transition" onclick="nav('#/p/${p.i}')"><div class="relative aspect-[3/4] bg-gray-100"><img src="${p.img}" class="w-full h-full object-cover" loading="lazy">${p.o?'<span class="absolute top-3 left-3 bg-red-500 text-white text-xs font-semibold px-2 py-1 rounded">-'+Math.round((1-p.p/p.o)*100)+'%</span>':''}<button onclick="event.stopPropagation();toggleFav(${p.i})" class="absolute top-3 right-3 w-9 h-9 bg-white rounded-full flex items-center justify-center shadow"><span class="${isF?'text-red-500':'text-gray-600'}">${isF?'❤':'♡'}</span></button></div><div class="p-4"><p class="text-xs text-gray-500 uppercase">${p.b}</p><h3 class="font-medium mt-1 truncate">${p.n}</h3><div class="flex items-baseline gap-2 mt-2"><span class="text-lg font-semibold">${p.p} ₴</span>${p.o?'<span class="text-sm text-gray-400 line-through">'+p.o+' ₴</span>':''}</div></div></div>`}
function carousel(t,items){return `<section class="max-w-7xl mx-auto px-4 py-8"><h2 class="text-2xl md:text-3xl font-bold mb-6">${t}</h2><div class="flex gap-4 overflow-x-auto pb-2" style="scrollbar-width:thin">${items.map(p=>'<div class="min-w-[260px] max-w-[260px]">'+pcard(p)+'</div>').join('')}</div></section>`}
function home(){return `${header()}<main><section class="bg-gradient-to-br from-gray-900 to-gray-700 text-white"><div class="max-w-7xl mx-auto px-4 py-20 md:py-32 grid md:grid-cols-2 gap-8 items-center"><div><p class="text-orange-400 font-semibold mb-3 uppercase text-sm">Нова колекція 2026</p><h1 class="text-4xl md:text-6xl font-bold leading-tight">Стиль починається тут</h1><p class="mt-4 text-lg text-gray-300">Колекція одягу для тих, хто цінує якість.</p><div class="flex gap-3 mt-8"><a href="#/c" class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-lg font-semibold">Каталог</a><a href="#/c?cat=d" class="bg-white/10 hover:bg-white/20 px-8 py-3 rounded-lg font-semibold border border-white/20">Новинки</a></div></div><div class="hidden md:block"><img src="https://picsum.photos/seed/hero/800/600" class="rounded-2xl shadow-2xl"></div></div></section><section class="max-w-7xl mx-auto px-4 py-12"><h2 class="text-2xl md:text-3xl font-bold mb-6">Категорії</h2><div class="grid grid-cols-3 md:grid-cols-6 gap-4">${Object.entries(C).slice(0,6).map(([k,v])=>'<a href="#/c?cat='+k+'" class="bg-white border hover:border-orange-500 hover:shadow-md rounded-xl p-5 text-center transition"><div class="text-4xl mb-2">👕</div><p class="text-sm font-medium">'+v+'</p></a>').join('')}</div></section>${carousel('🔥 Хіти продажів',P.slice(0,8))}${carousel('✨ Новинки',P.slice(4,12))}${carousel('💸 Знижки',P.filter(x=>x.o))}<section class="bg-white border-y py-12"><div class="max-w-7xl mx-auto px-4 grid md:grid-cols-4 gap-8 text-center">${[['🚚','Безкоштовна доставка','Від 1500 ₴'],['↩️','Повернення','14 днів'],['🛡️','Гарантія','Якість'],['💳','Оплата','Картка/післяплата']].map(f=>'<div><div class="text-4xl mb-3">'+f[0]+'</div><h3 class="font-semibold mb-1">'+f[1]+'</h3><p class="text-sm text-gray-600">'+f[2]+'</p></div>').join('')}</div></section><section class="max-w-5xl mx-auto px-4 py-16 text-center"><h2 class="text-3xl font-bold mb-4">Про магазин</h2><p class="text-gray-600">STYLE.UA — укра let f={cat:'all',g:'all',pm:7000};
function catalog(){const ps=new URLSearchParams(location.hash.split('?')[1]||'');if(ps.get('cat'))f.cat=ps.get('cat');if(ps.get('g'))f.g=ps.get('g');const fl=P.filter(x=>(f.cat==='all'||x.c===f.cat)&&(f.g==='all'||x.g===f.g||x.g==='u')&&x.p<=f.pm);return `${header()}<main class="max-w-7xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-6">Каталог</h1><div class="grid lg:grid-cols-[260px_1fr] gap-8"><aside class="bg-white border rounded-xl p-5 h-fit"><h3 class="font-semibold mb-3">Категорія</h3><div class="space-y-1"><button onclick="setF('cat','all')" class="w-full text-left px-3 py-2 rounded text-sm ${f.cat==='all'?'bg-black text-white':'hover:bg-gray-100'}">Усі товари</button>${Object.entries(C).map(([k,v])=>'<button onclick="setF(\\'cat\\',\\''+k+'\\')" class="w-full text-left px-3 py-2 rounded text-sm '+(f.cat===k?'bg-black text-white':'hover:bg-gray-100')+'">'+v+'</button>').join('')}</div><h3 class="font-semibold mt-6 mb-3">Стать</h3><div class="flex gap-2 flex-wrap">${[['all','Усі'],['m','Чол.'],['w','Жін.'],['u','Унісекс']].map(x=>'<button onclick="setF(\\'g\\',\\''+x[0]+'\\')" class="px-3 py-1.5 rounded text-xs border '+(f.g===x[0]?'bg-black text-white border-black':'border-gray-300')+'">'+x[1]+'</button>').join('')}</div><h3 class="font-semibold mt-6 mb-3">Ціна до: ${f.pm} ₴</h3><input type="range" min="500" max="7000" step="100" value="${f.pm}" oninput="setF('pm',+this.value)" class="w-full"></aside><div><p class="text-gray-600 mb-4">Знайдено: ${fl.length}</p>${fl.length===0?'<div class="text-center py-20 text-gray-500">Товарів не знайдено</div>':'<div class="grid grid-cols-2 md:grid-cols-3 gap-5">'+fl.map(pcard).join('')+'</div>'}</div></div></main>${footer()}`}
function setF(k,v){f[k]=v;render()}
let pdState={sz:'',cl:'Чорний',q:1};
function product(){const id=+location.hash.split('/')[2];const p=P.find(x=>x.i===id);if(!p)return header()+'<div class="text-center py-20">Не знайдено</div>'+footer();const isF=st.fav.includes(p.i);return `${header()}<main class="max-w-7xl mx-auto px-4 py-8"><nav class="text-sm text-gray-500 mb-6"><a href="#/" class="hover:text-black">Головна</a> / <a href="#/c" class="hover:text-black">Каталог</a> / <span class="text-black">${p.n}</span></nav><div class="grid md:grid-cols-2 gap-10"><div class="bg-gray-100 rounded-2xl overflow-hidden aspect-square"><img src="${p.img}" class="w-full h-full object-cover"></div><div><p class="text-xs text-gray-500 uppercase">${p.b}</p><h1 class="text-3xl font-bold mt-1">${p.n}</h1><div class="flex items-baseline gap-3 mt-4"><span class="text-3xl font-bold">${p.p} ₴</span>${p.o?'<span class="text-xl text-gray-400 line-through">'+p.o+' ₴</span>':''}</div><p class="text-gray-600 mt-5">${p.d}</p><div class="mt-6"><p class="font-semibold mb-2">Розмір:</p><div class="flex gap-2 flex-wrap">${p.s.map(s=>'<button onclick="pdState.sz=\\''+s+'\\';render()" class="px-4 py-2 rounded border-2 text-sm '+(pdState.sz===s?'bg-black text-white border-black':'border-gray-300')+'">'+s+'</button>').join('')}</div></div><div class="mt-6 flex items-center gap-3"><p class="font-semibold">Кількість:</p><div class="flex items-center border rounded-lg"><button onclick="pdState.q=Math.max(1,pdState.q-1);render()" class="px-3 py-2">−</button><span class="px-4">${pdState.q}</span><button onclick="pdState.q++;render()" class="px-3 py-2">+</button></div></div><div class="mt-8 flex gap-3"><button onclick="addCart(${p.i})" class="flex-1 bg-black text-white px-6 py-4 rounded-lg font-semibold hover:bg-gray-800">Додати в кошик</button><button onclick="toggleFav(${p.i})" class="px-5 py-4 border-2 rounded-lg"><span class="${isF?'text-red-500':''}">${isF?'❤':'♡'}</span></button></div><div class="mt-8 grid grid-cols-2 gap-3 text-sm"><div class="bg-gray-50 p-3 rounded">🚚 Доставка 1–3 дні</div><div class="bg-gray-50 p-3 rounded">↩️ Повернення 14 днів</div></div></div></div></main>${footer()}`}
function addCart(id){const p=P.find(x=>x.i===id);if(!pdState.sz){alert('Оберіть розмір');return}const k=p.i+'-'+pdState.sz;const e=st.cart.find(x=>x.k===k);if(e)e.q+=pdState.q;else st.cart.push({k,id:p.i,sz:pdState.sz,cl:pdState.cl,q:pdState.q,p:{n:p.n,p:p.p,img:p.img}});pdState.q=1;save();toast('✓ Додано в кошик');render()}
function toggleFav(id){if(st.fav.includes(id))st.fav=st.fav.filter(x=>x!==id);else st.fav.push(id);save();render()}
function rmCart(k){st.cart=st.cart.filter(x=>x.k!==k);save();render()}
function uqCart(k,d){const i=st.cart.find(x=>x.k===k);if(i){i.q=Math.max(1,i.q+d);save();render()}}
function cart(){const t=st.cart.reduce((s,i)=>s+i.p.p*i.q,0);const d=t>=1500||t===0?0:80;if(st.cart.length===0)return `${header()}<main class="max-w-3xl mx-auto px-4 py-20 text-center"><div class="text-6xl mb-4">🛒</div><h1 class="text-3xl font-bold">Кошик порожній</h1><a href="#/c" class="inline-block mt-6 bg-black text-white px-8 py-3 rounded-lg font-semibold">У каталог</a></main>${footer()}`;return `${header()}<main class="max-w-7xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-6">Кошик</h1><div class="grid lg:grid-cols-[1fr_360px] gap-8"><div class="space-y-4">${st.cart.map(i=>'<div class="bg-white border rounded-xl p-4 flex gap-4"><img src="'+i.p.img+'" class="w-24 h-24 object-cover rounded cursor-pointer" onclick="nav(\\'#/p/'+i.id+'\\')"><div class="flex-1"><h3 class="font-semibold">'+i.p.n+'</h3><p class="text-sm text-gray-500 mt-1">Розмір: '+i.sz+', Колір: '+i.cl+'</p><div class="flex items-center gap-3 mt-3"><div class="flex items-center border rounded-lg"><button onclick="uqCart(\\''+i.k+'\\',-1)" class="px-3 py-1">−</button><span class="px-3">'+i.q+'</span><button onclick="uqCart(\\''+i.k+'\\',1)" class="px-3 py-1">+</button></div><button onclick="rmCart(\\''+i.k+'\\')" class="text-sm text-red-500">Видалити</button></div></div><div class="text-right"><div class="font-bold text-lg">'+(i.p.p*i.q)+' ₴</div></div></div>').join('')}</div><aside class="bg-white border rounded-xl p-6 h-fit"><h3 class="font-bold text-lg mb-4">Разом</h3><div class="space-y-2 text-sm"><div class="flex justify-between"><span>Товари:</span><span>${t} ₴</span></div><div class="flex justify-between"><span>Доставка:</span><span>${d===0?'Безкоштовно':d+' ₴'}</span></div></div><div class="border-t my-4"></div><div class="flex justify-between font-bold text-xl"><span>До сплати:</span><span>${t+d} ₴</span></div><a href="#/co" class="block w-full mt-5 bg-black text-white py-3 rounded-lg font-semibold text-center">Оформити замовлення</a></aside></div></main>${footer()}`}
let coState={n:'',ph:'',em:'',ct:'',br:'',pm:'card'};
function checkout(){if(st.cart.length===0)return header()+'<div class="text-center py-20">Кошик порожній</div>'+footer();const t=st.cart.reduce((s,i)=>s+i.p.p*i.q,0);const d=t>=1500?0:80;if(st.user&&!coState.n){coState.n=st.user.n;coState.em=st.user.em;coState.ph=st.user.ph||''}return `${header()}<main class="max-w-6xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-6">Оформлення замовлення</h1><form onsubmit="submitOrder(event)" class="grid lg:grid-cols-[1fr_360px] gap-8"><div class="space-y-6"><section class="bg-white border rounded-xl p-6"><h3 class="font-bold text-lg mb-4">1. Контактні дані</h3><div class="grid md:grid-cols-2 gap-4"><input class="border rounded-lg p-3" placeholder="Ім'я*" value="${coState.n}" oninput="coState.n=this.value" required><input class="border rounded-lg p-3" placeholder="Телефон* +380..." value="${coState.ph}" oninput="coState.ph=this.value" required><input type="email" class="border rounded-lg p-3 md:col-span-2" placeholder="Email" value="${coState.em}" oninput="coState.em=this.value"></div></section><section class="bg-white border rounded-xl p-6"><h3 class="font-bold text-lg mb-4">2. Доставка по Україні</h3><div class="flex items-center gap-2 mb-4 text-sm text-gray-600"><span class="bg-red-500 text-white px-2 py-0.5 rounded text-xs font-bold">📦 Нова Пошта</span><span>1–3 робочих дні</span></div><div class="grid md:grid-cols-2 gap-4"><select class="border rounded-lg p-3" oninput="coState.ct=this.value" required><option value="">Оберіть місто*</option>${CITIES.map(c=>'<option '+(coState.ct===c?'selected':'')+'>'+c+'</option>').join('')}</select><input class="border rounded-lg p-3" placeholder="№ відділення*" value="${coState.br}" oninput="coState.br=this.value" required></div></section><section class="bg-white border rounded-xl p-6"><h3 class="font-bold text-lg mb-4">3. Оплата</h3><div class="space-y-2">${[['card','💳 Карткою онлайн'],['cod','💵 Післяплата'],['iban','🏦 За реквізитами']].map(p=>'<label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer '+(coState.pm===p[0]?'border-black bg-gray-50':'')+'"><input type="radio" name="pm" value="'+p[0]+'" '+(coState.pm===p[0]?'checked':'')+' oninput="coState.pm=this.value"><span>'+p[1]+'</span></label>').join('')}</div></section></div><aside class="bg-white border rounded-xl p-6 h-fit"><h3 class="font-bold text-lg mb-4">Замовлення</h3><div class="space-y-3 text-sm">${st.cart.map(i=>'<div class="flex justify-between"><span>'+i.p.n+' × '+i.q+'</span><span>'+(i.p.p*i.q)+' ₴</span></div>').join('')}</div><div class="border-t my-4"></div><div class="flex justify-between text-sm"><span>Доставка:</span><span>${d===0?'Безкоштовно':d+' ₴'}</span></div><div class="flex justify-between font-bold text-xl mt-2"><span>До сплати:</span><span>${t+d} ₴</span></div><button type="submit" class="w-full mt-5 bg-black text-white py-3 rounded-lg font-semibold">Підтвердити</button></aside></form></main>${footer()}`}
function submitOrder(e){e.preventDefault();const t=st.cart.reduce((s,i)=>s+i.p.p*i.q,0);const d=t>=1500?0:80;const o={i:Date.now(),dt:new Date().toISOString(),it:[...st.cart],t:t+d,...coState,st:'Прийнято'};st.orders.unshift(o);st.cart=[];save();toast('🎉 Замовлення оформлено!');coState={n:'',ph:'',em:'',ct:'',br:'',pm:'card'};nav('#/acc')}
function login(){return `${header()}<main class="max-w-md mx-auto px-4 py-12"><div class="bg-white border rounded-xl p-8"><h1 class="text-2xl font-bold mb-2">Вхід / Реєстрація</h1><p class="text-gray-500 text-sm mb-6">Увійдіть, щоб відстежувати замовлення</p><form onsubmit="doLogin(event)" class="space-y-3"><input id="ln" class="border rounded-lg p-3 w-full" placeholder="Ваше ім'я"><input id="le" type="email" class="border rounded-lg p-3 w-full" placeholder="Email" required><input id="lp" class="border rounded-lg p-3 w-full" placeholder="Телефон +380..."><input id="lpw" type="password" class="border rounded-lg p-3 w-full" placeholder="Пароль" required><button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-semibold">Увійти</button></form></div></main>${footer()}`}
function doLogin(e){e.preventDefault();const em=$('#le').value;const n=$('#ln').value||em.split('@')[0];st.user={n,em,ph:$('#lp').value};save();toast('👋 З поверненням!');nav('#/acc')}
function account(){if(!st.user)return login();return `${header()}<main class="max-w-5xl mx-auto px-4 py-8"><div class="flex items-center justify-between mb-6"><h1 class="text-3xl font-bold">Особистий кабінет</h1><button onclick="st.user=null;save();render()" class="text-sm text-gray-600 hover:text-red-500">Вийти</button></div><div class="bg-gradient-to-br from-orange-500 to-red-500 text-white rounded-xl p-6 mb-6"><div class="flex items-center gap-4"><div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-2xl font-bold">${st.user.n[0].toUpperCase()}</div><div><h2 class="text-xl font-bold">Привіт, ${st.user.n}!</h2><p class="text-white/90 text-sm">${st.user.em}</p></div></div></div><h2 class="text-xl font-bold mb-4">Мої замовлення</h2>${st.orders.length===0?'<div class="text-center py-12 text-gray-500"><div class="text-5xl mb-3">📭</div><p>Замовлень поки немає</p><a href="#/c" class="inline-block mt-4 bg-black text-white px-6 py-2 rounded-lg">У каталог</a></div>':'<div class="space-y-4">'+st.orders.map(o=>'<div class="bg-white border rounded-xl p-5"><div class="flex justify-between mb-3"><div><div class="font-bold">Замовлення #'+o.i+'</div><div class="text-sm text-gray-500">'+new Date(o.dt).toLocaleString('uk-UA')+'</div></div><span class="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">'+o.st+'</span></div><div class="text-sm text-gray-600 mb-3">📍 '+o.ct+', '+o.br+'</div><div class="flex justify-between"><span class="text-gray-600">'+o.it.length+' товар(ів)</span><span class="font-bold text-lg">'+o.t+' ₴</span></div></div>').join('')+'</div>'}</main>${footer()}`}
function fav(){const it=P.filter(x=>st.fav.includes(x.i));return `${header()}<main class="max-w-7xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-6">Обране (${it.length})</h1>${it.length===0?'<div class="text-center py-20"><div class="text-6xl mb-3">💔</div><p class="text-gray-600">Поки порожньо</p></div>':'<div class="grid grid-cols-2 md:grid-cols-4 gap-5">'+it.map(pcard).join('')+'</div>'}</main>${footer()}`}
function render(){const h=location.hash||'#/';const p=h.split('?')[0];let html;if(p==='#/'||p==='#')html=home();else if(p.startsWith('#/c?')||p==='#/c')html=catalog();else if(p.startsWith('#/p/'))html=product();else if(p==='#/cart')html=cart();else if(p==='#/co')html=checkout();else if(p==='#/acc')html=account();else if(p==='#/fav')html=fav();else if(p==='#/login')html=login();else html=header()+'<div class="text-center py-20">Не знайдено</div>'+footer();$('#a').innerHTML=html;scrollTo(0,0)}
addEventListener('hashchange',render);render();
</script></body></html>
